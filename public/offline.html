<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#2563eb" />
    <title>Offline | Shortly</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
      }
      main {
        width: min(90vw, 32rem);
        padding: 2.5rem;
        border: 1px solid #e2e8f0;
        border-radius: 0.5rem;
        background: #ffffff;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 5vw, 2.5rem);
      }
      p {
        color: #475569;
        line-height: 1.7;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #020617;
          color: #e2e8f0;
        }
        main {
          background: #0f172a;
          border-color: #1e293b;
        }
        p {
          color: #cbd5e1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>Shortly is install-ready and can show this offline fallback when service worker caching is enabled in a future release.</p>
    </main>
  </body>
</html>
