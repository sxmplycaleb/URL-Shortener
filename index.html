    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Production-ready URL shortener dashboard and analytics interface." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Shortly" />
    <meta property="og:title" content="Shortly URL Shortener" />

    <script>
      const theme = localStorage.getItem("theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (theme === "dark" || (!theme && prefersDark)) {
        document.documentElement.classList.add("dark");
      }
    </script>
    <title>Shortly URL Shortener</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
